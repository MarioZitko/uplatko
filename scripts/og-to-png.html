<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>OG Image → PNG Converter</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 2rem; gap: 1.5rem; }
    canvas { border: 1px solid #333; max-width: 100%; }
    button { background: #3b82f6; color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2563eb; }
    p { color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h2>og-image.png generator</h2>
  <canvas id="c" width="1200" height="630"></canvas>
  <button onclick="downloadPng()">⬇ Preuzmi og-image.png</button>
  <p>Otvori ovaj file u Chromeu (File → Open), pričekaj da se slika učita, zatim klikni gumb.</p>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#18181b"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.03"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1200" height="4" fill="#3b82f6"/>
  <g transform="translate(120, 235)">
    <rect width="96" height="96" rx="20" fill="#27272a"/>
    <rect x="14" y="22" width="5" height="52" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="22" y="22" width="2.5" height="52" rx="1" fill="white" opacity="0.9"/>
    <rect x="27" y="22" width="6" height="52" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="36" y="22" width="2.5" height="52" rx="1" fill="white" opacity="0.9"/>
    <rect x="41" y="22" width="4" height="52" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="48" y="22" width="2.5" height="52" rx="1" fill="white" opacity="0.9"/>
    <rect x="53" y="22" width="5.5" height="52" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="61.5" y="22" width="2.5" height="52" rx="1" fill="white" opacity="0.9"/>
    <rect x="67" y="22" width="3" height="52" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="73" y="22" width="5" height="52" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="81" y="22" width="2" height="52" rx="1" fill="white" opacity="0.9"/>
  </g>
  <text x="244" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" fill="white" letter-spacing="-2">Uplatko</text>
  <text x="244" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#a1a1aa" letter-spacing="0.5">Generator HUB-3 uplatnica i PDF417 barkoda</text>
  <rect x="244" y="400" width="110" height="38" rx="19" fill="#3b82f6" opacity="0.2"/>
  <text x="299" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle">Besplatno</text>
  <rect x="366" y="400" width="176" height="38" rx="19" fill="#3b82f6" opacity="0.2"/>
  <text x="454" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle">Bez registracije</text>
  <rect x="554" y="400" width="178" height="38" rx="19" fill="#3b82f6" opacity="0.2"/>
  <text x="643" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle">Podaci lokalno</text>
  <g opacity="0.08">
    <rect x="960" y="100" width="12" height="430" rx="3" fill="white"/>
    <rect x="980" y="100" width="6" height="430" rx="2" fill="white"/>
    <rect x="993" y="100" width="16" height="430" rx="3" fill="white"/>
    <rect x="1016" y="100" width="6" height="430" rx="2" fill="white"/>
    <rect x="1029" y="100" width="10" height="430" rx="3" fill="white"/>
    <rect x="1046" y="100" width="6" height="430" rx="2" fill="white"/>
    <rect x="1059" y="100" width="14" height="430" rx="3" fill="white"/>
    <rect x="1080" y="100" width="6" height="430" rx="2" fill="white"/>
    <rect x="1093" y="100" width="8" height="430" rx="3" fill="white"/>
    <rect x="1108" y="100" width="12" height="430" rx="3" fill="white"/>
    <rect x="1127" y="100" width="5" height="430" rx="2" fill="white"/>
    <rect x="1139" y="100" width="10" height="430" rx="3" fill="white"/>
    <rect x="1156" y="100" width="6" height="430" rx="2" fill="white"/>
    <rect x="1169" y="100" width="14" height="430" rx="3" fill="white"/>
  </g>
  <text x="120" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#52525b">uplatko.com</text>
</svg>`;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);

    img.onload = () => {
      ctx.drawImage(img, 0, 0, 1200, 630);
    };
    img.src = encoded;

    function downloadPng() {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
